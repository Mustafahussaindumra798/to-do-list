<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mustafa's Tasks | Premium Task Suite</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">

    <!-- External Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="brand">
                <div class="logo-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                </div>
                <h1 class="brand-title">Mustafa's Tasks</h1>
            </div>
            <div class="divider"></div>
        </div>

        <p class="nav-label">Views</p>
        <nav>
            <div class="nav-item active" onclick="setFilter('all', this)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                All Tasks
            </div>
            <div class="nav-item" onclick="setFilter('today', this)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                Due Today
            </div>
            <div class="nav-item" onclick="setFilter('high', this)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                High Priority
            </div>
            <div class="nav-item" onclick="setFilter('completed', this)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
                Completed
            </div>
        </nav>

        <div class="sidebar-footer">
            <div class="progress-ring-container">
                <svg width="110" height="110">
                    <circle cx="55" cy="55" r="48" stroke="rgba(229,199,107,0.05)" stroke-width="8" fill="transparent"/>
                    <circle id="progressCircle" class="progress-ring-circle" cx="55" cy="55" r="48" stroke="var(--primary-gold)" stroke-width="8" fill="transparent" stroke-dasharray="301.6" stroke-dashoffset="301.6" stroke-linecap="round"/>
                </svg>
                <div class="progress-text" id="progressText">0%</div>
            </div>
            <p style="font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;">Success Rate</p>
            <button class="btn-clear" onclick="clearCompleted()">Clear Completed</button>
        </div>
    </aside>

    <!-- Main Container -->
    <main class="main-container">
        <header class="top-bar">
            <div class="mobile-menu" onclick="toggleSidebar()">
                <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </div>
            <div class="search-container">
                <svg class="search-icon" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" class="search-input" id="searchInput" placeholder="Search across objectives..." oninput="handleSearch()">
            </div>
            <div class="theme-toggle" onclick="toggleTheme()">
                <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </div>
        </header>

        <section class="stats-bar">
            <div class="stat-card">
                <span class="stat-label">Total Scope</span>
                <span class="stat-value val-total" id="statTotal">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">In Progress</span>
                <span class="stat-value val-remaining" id="statRemaining">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Achieved</span>
                <span class="stat-value val-completed" id="statCompleted">0</span>
            </div>
        </section>

        <div class="add-task-card">
            <input type="text" class="task-input" id="taskName" placeholder="Define new objective...">
            <select class="select-custom" id="taskPriority">
                <option value="low">Low Priority</option>
                <option value="medium" selected>Medium Priority</option>
                <option value="high">High Priority</option>
            </select>
            <input type="date" class="date-custom" id="taskDate">
            <button class="btn-add" onclick="addTask()">Add Objective</button>
        </div>

        <div class="filter-tabs">
            <div class="filter-tab active" onclick="setFilter('all', this)">All</div>
            <div class="filter-tab" onclick="setFilter('active', this)">Active</div>
            <div class="filter-tab" onclick="setFilter('completed', this)">Completed</div>
            <div class="filter-tab" onclick="setFilter('high', this)">High Priority</div>
        </div>

        <div class="task-list" id="taskList" ondragover="handleDragOver(event)">
            <!-- Tasks injected here -->
        </div>
    </main>

    <!-- External Script -->
    <script src="script.js"></script>
</body>
</html>
