<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mustafa's Tasks | Ultimate Efficiency</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <!-- External Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="dark">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="brand">
                <div class="logo-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                </div>
                <h1 class="brand-title">Mustafa's Tasks</h1>
            </div>
            <div class="divider"></div>
        </div>

        <p class="nav-label">Workspace</p>
        <nav>
            <div class="nav-item active" onclick="setFilter('all')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                All Objectives
            </div>
            <div class="nav-item" onclick="setFilter('today')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                Due Today
            </div>
            <div class="nav-item" onclick="setFilter('high')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg>
                High Priority
            </div>
            <div class="nav-item" onclick="setFilter('completed')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                Completed
            </div>
        </nav>

        <div class="sidebar-footer">
            <div class="progress-container">
                <div class="progress-header">
                    <span>Performance</span>
                    <span id="progressPercent">0%</span>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progressBar"></div>
                </div>
            </div>
            
            <button class="btn-sidebar btn-sidebar-danger" onclick="clearAllTasks()">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                Clear All Data
            </button>
        </div>
    </aside>

    <!-- Main Container -->
    <main class="main-container">
        <header class="top-bar">
            <div class="mobile-menu" onclick="toggleSidebar()">
                <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </div>
            
            <div class="search-container">
                <svg class="search-icon" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" class="search-input" id="searchInput" placeholder="Search across your workspace..." oninput="handleSearch()">
            </div>
            
            <div class="action-buttons">
                <div class="btn-icon" onclick="toggleTheme()" title="Toggle Dark/Light Mode">
                    <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </div>
            </div>
        </header>

        <section class="stats-bar">
            <div class="stat-card">
                <span class="stat-label">Total Scope</span>
                <span class="stat-value" id="statTotal">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Active Focus</span>
                <span class="stat-value accent" id="statRemaining">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Successful</span>
                <span class="stat-value" id="statCompleted">0</span>
            </div>
        </section>

        <div class="add-task-card">
            <input type="text" class="task-input" id="taskName" placeholder="What is your next objective?">
            <select class="custom-select" id="taskPriority">
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High Priority</option>
            </select>
            <input type="date" class="custom-date" id="taskDate">
            <button class="btn-primary" onclick="addTask()">Deploy Task</button>
        </div>

        <div class="list-header">
            <div class="filter-tabs">
                <div class="filter-tab active" onclick="setFilter('all')">All</div>
                <div class="filter-tab" onclick="setFilter('active')">Active</div>
                <div class="filter-tab" onclick="setFilter('completed')">Done</div>
            </div>
            
            <div style="display:flex; gap: 10px; align-items:center;">
                <span style="font-size: 12px; font-weight: 700; color: var(--text-muted);">SORT BY:</span>
                <select class="custom-select" style="padding: 0.4rem 0.8rem; font-size: 12px;" onchange="setSort(this.value)">
                    <option value="order">Newest First</option>
                    <option value="priority">Priority</option>
                    <option value="date">Due Date</option>
                </select>
            </div>
        </div>

        <div class="task-list" id="taskList">
            <!-- Tasks are injected here -->
        </div>
    </main>

    <!-- External Script -->
    <script src="script.js"></script>
</body>
</html>
